name: Run notebooks and publish site

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      mode:
        description: Benchmark mode
        type: choice
        default: full
        options: [quick, full]
  schedule:
    - cron: "0 4 * * *"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  notebooks:
    runs-on: ubuntu-latest
    env:
      MODE: ${{ github.event_name == 'push' && 'quick' || github.event.inputs.mode || 'full' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: python -m pip install -r notebooks/requirements.txt

      - name: Patch benchmark for quick mode
        if: env.MODE == 'quick'
        run: |
          sed -i 's/R_LIST   = \[128, 256, 512, 1024, 2048, 4096, 8192, 16384\]/R_LIST   = [128, 256, 512, 1024, 2048, 4096]/' notebooks/secapp_updated.ipynb
          sed -i 's/N_EXP    = 100/N_EXP    = 5/' notebooks/secapp_updated.ipynb

      - name: Execute benchmark notebook
        run: jupyter nbconvert --execute --to notebook --inplace notebooks/secapp_updated.ipynb --ExecutePreprocessor.timeout=7200

      - name: Execute application notebook
        run: jupyter nbconvert --execute --to notebook --inplace notebooks/Application_2.ipynb --ExecutePreprocessor.timeout=7200

      - name: Collect generated assets
        run: |
          mkdir -p site/public/figures site/public/data
          find . -maxdepth 2 -type f \( -name '*.png' -o -name '*.csv' \) \
            ! -path './site/*' \
            ! -path './.git/*' \
            -print0 | while IFS= read -r -d '' file; do
              case "$file" in
                *.png) cp "$file" site/public/figures/ ;;
                *.csv) cp "$file" site/public/data/ ;;
              esac
            done
          (cd site/public && zip -qr figures-and-tables.zip figures data)

      - name: Upload figures and tables
        uses: actions/upload-artifact@v4
        with:
          name: figures-and-tables
          path: |
            site/public/figures
            site/public/data
            site/public/figures-and-tables.zip

      - name: Commit regenerated assets
        if: github.ref == 'refs/heads/main'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add site/public/figures site/public/data site/public/figures-and-tables.zip
          git diff --cached --quiet || git commit -m "Regenerate notebook assets [skip ci]"

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: site/package-lock.json

      - name: Build static site
        working-directory: site
        env:
          GITHUB_PAGES: "true"
          NEXT_PUBLIC_BASE_PATH: /Codes_for_fqidcvt
        run: |
          npm ci
          npm run build

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site/out
      - uses: actions/deploy-pages@v4
